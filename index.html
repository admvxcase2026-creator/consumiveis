<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consumíveis · VX Case</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0a0b0d;
    --bg-grad:radial-gradient(circle at 20% -10%, #0f1c30 0%, #0a0b0d 45%);
    --panel:#131518;
    --panel2:#191b1f;
    --border:#262930;
    --text:#eef0f4;
    --muted:#8d8f99;
    --accent:#4f8cff;
    --accent-grad:linear-gradient(135deg,#4f8cff 0%,#1f5ce0 100%);
    --ok:#38e2a8;
    --repor:#e8c14f;
    --urgente:#ff9f43;
    --critico:#ff6b6f;
    --shadow:0 8px 30px rgba(0,0,0,.4);
  }
  body.light{
    --bg:#f4f6fa;
    --bg-grad:radial-gradient(circle at 20% -10%, #e3ecff 0%, #f4f6fa 45%);
    --panel:#ffffff;
    --panel2:#f5f7fb;
    --border:#e1e5ee;
    --text:#191b1f;
    --muted:#6c6e78;
    --accent:#2b5ce0;
    --accent-grad:linear-gradient(135deg,#2b5ce0 0%,#123f9e 100%);
    --shadow:0 8px 24px rgba(20,20,40,.08);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg-grad),var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;padding:24px;min-height:100vh;}
  h1,h2,h3,.brand,button{font-family:'Sora',sans-serif;}
  .wrap{max-width:1200px;margin:0 auto;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .brand{font-size:19px;font-weight:700;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);font-size:13px;margin-top:2px;font-family:'Inter',sans-serif;}
  .icon-btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
  .icon-btn:hover{border-color:var(--accent);}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:18px;box-shadow:var(--shadow);}
  label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
  input,select{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:'Inter',sans-serif;}
  input:focus,select:focus{border-color:var(--accent);}
  .btn-primary{background:var(--accent-grad);border:none;color:#fff;padding:13px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-secondary{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:13px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;width:100%;}
  .btn-secondary:hover{border-color:var(--accent);}
  .mini-btn{background:var(--panel2);border:1px solid var(--border);color:var(--accent);border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer;font-weight:600;}

  .home-overlay{position:fixed;inset:0;background:var(--bg-grad),var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;}
  .home-box{max-width:440px;width:100%;text-align:center;}
  .home-title{font-size:24px;font-weight:800;margin-bottom:6px;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .home-sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
  .home-opt{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:18px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);margin-bottom:12px;width:100%;text-align:left;display:flex;align-items:center;gap:12px;}
  .home-opt:hover{border-color:var(--accent);}
  .home-opt .desc{font-size:11.5px;color:var(--muted);font-weight:400;font-family:'Inter',sans-serif;margin-top:3px;}
  .name-grid{display:flex;flex-direction:column;gap:10px;}
  .name-btn{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:14px 16px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);}
  .name-btn:hover{border-color:var(--accent);}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  thead th{text-align:left;padding:9px 10px;font-size:10.5px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
  tbody td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  .qtd-input{width:80px;padding:7px 8px;font-size:12.5px;text-align:center;}
  .num{text-align:center;}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:700;}
  .badge-ok{background:rgba(56,226,168,.15);color:var(--ok);}
  .badge-repor{background:rgba(232,193,79,.15);color:var(--repor);}
  .badge-urgente{background:rgba(255,159,67,.15);color:var(--urgente);}
  .badge-critico{background:rgba(255,107,111,.18);color:var(--critico);}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

  .config-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
  .config-item{flex:1;min-width:160px;}
  .config-item input{text-align:center;}

  .kiosk-card{border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:14px;background:var(--panel2);}
  .kiosk-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .kiosk-head h3{font-size:14px;margin:0;}
  .kiosk-head .kiosk-date{font-size:11px;color:var(--muted);}
  .alert-summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
  .alert-chip{border-radius:10px;padding:10px 14px;font-size:12.5px;font-weight:700;flex:1;min-width:150px;text-align:center;}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;z-index:60;padding:20px;}
  .overlay.open{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px;width:92%;max-width:520px;max-height:82vh;overflow-y:auto;box-shadow:var(--shadow);}
  .modal h3{margin:0 0 14px;}
  .modal-add-row{display:flex;gap:8px;margin-bottom:12px;}
  .modal-add-row button{background:var(--accent-grad);border:none;color:#fff;border-radius:9px;padding:0 14px;cursor:pointer;font-weight:600;}
  .list-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:12.5px;background:var(--panel2);}
  .list-item button{background:transparent;border:1px solid var(--border);color:var(--critico);border-radius:6px;padding:5px 9px;font-size:11px;cursor:pointer;}
  .modal-close{width:100%;margin-top:6px;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:11px;border-radius:9px;cursor:pointer;font-weight:600;}
  .empty-msg{color:var(--muted);font-size:12px;text-align:center;padding:14px 0;}
</style>
</head>
<body>

<div class="home-overlay" id="homeOverlay">
  <div class="home-box">
    <div class="home-title">Controle de Consumíveis</div>
    <div class="home-sub">O que você quer fazer?</div>
    <button class="home-opt" onclick="irParaPreencher()">
      <div>📝<div>Preencher meu quiosque<div class="desc">Registrar vendas do período e contagem de estoque</div></div></div>
    </button>
    <button class="home-opt" onclick="irParaPainel()">
      <div>📊<div>Painel Central<div class="desc">Visão de todos os quiosques e o que precisa repor</div></div></div>
    </button>
  </div>
</div>

<div class="wrap" id="mainApp" style="display:none;">
  <div class="topbar">
    <div>
      <div class="brand">Controle de Consumíveis · VX Case</div>
      <div class="sub" id="topSub">-</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="icon-btn" onclick="voltarHome()">← Início</button>
      <button class="icon-btn" id="themeToggle" onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div id="panelPreencher" style="display:none;"></div>
  <div id="panelPainel" style="display:none;"></div>
</div>

<div class="overlay" id="overlayQuiosques">
  <div class="modal">
    <h3>Quiosques cadastrados</h3>
    <div class="modal-add-row">
      <input id="novoQuiosque" placeholder="NOME DO QUIOSQUE">
      <button onclick="addQuiosque()">Adicionar</button>
    </div>
    <div id="listaQuiosques"></div>
    <button class="modal-close" onclick="closeModal('overlayQuiosques')">Fechar</button>
  </div>
</div>

<div class="overlay" id="overlayProdutos">
  <div class="modal">
    <h3>Produtos / consumíveis cadastrados</h3>
    <div class="sub" style="margin-bottom:12px;">A proporção é "quantidade usada por venda". Ex: 1 = um por venda, 0.3 = um a cada ~3 vendas, 3 = três por venda.</div>
    <div class="modal-add-row" style="flex-wrap:wrap;">
      <input id="novoProdCod" placeholder="CÓD" style="max-width:80px;">
      <input id="novoProdNome" placeholder="PRODUTO" style="flex:2;min-width:140px;">
      <input id="novoProdRatio" placeholder="PROPORÇÃO" type="number" step="0.1" style="max-width:110px;">
      <button onclick="addProdutoConsumivel()">Adicionar</button>
    </div>
    <div id="listaProdutosConsumiveis"></div>
    <button class="modal-close" onclick="closeModal('overlayProdutos')">Fechar</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fevhyllvfhvzzfhwyjuk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZldmh5bGx2Zmh2enpmaHd5anVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzEyMTcsImV4cCI6MjA5NDQ0NzIxN30.GJRgEKW1bVWX1957_bKCTO6aVmR_rXWRCmo9-ZJDPiE';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const USUARIOS = ['Rodrigo Pereira', 'Raquel França', 'Amanda Menezes', 'Suiane Lopes', 'Felipe Santana'];

let quiosquesCache = [];
let produtosCache = [];
let configCache = { dias_analisados: 15, dias_cobertura_desejada: 15, estoque_seguranca_pct: 20 };
let quiosqueAtual = null;
let usuarioAtual = null;

/* ================= THEME ================= */
function toggleTheme(){
  document.body.classList.toggle('light');
  document.getElementById('themeToggle').textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
  localStorage.setItem('consumiveis_theme', document.body.classList.contains('light') ? 'light' : 'dark');
}
(function(){ if(localStorage.getItem('consumiveis_theme')==='light'){ document.body.classList.add('light'); } })();

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

/* ================= CARGA INICIAL ================= */
async function carregarTudo(){
  const [{ data: q }, { data: p }, { data: c }] = await Promise.all([
    sb.from('consumiveis_quiosques').select('*').order('nome'),
    sb.from('consumiveis_produtos').select('*').order('ordem'),
    sb.from('consumiveis_config').select('*')
  ]);
  quiosquesCache = q || [];
  produtosCache = p || [];
  if(c){ c.forEach(row => { configCache[row.chave] = Number(row.valor); }); }
}

/* ================= QUIOSQUES (cadastro) ================= */
function openQuiosques(){ renderQuiosques(); document.getElementById('overlayQuiosques').classList.add('open'); }
function renderQuiosques(){
  const c = document.getElementById('listaQuiosques');
  if(quiosquesCache.length === 0){ c.innerHTML = '<div class="empty-msg">Nenhum quiosque cadastrado ainda.</div>'; return; }
  c.innerHTML = quiosquesCache.map(q => `
    <div class="list-item"><span>${q.nome}</span><button onclick="delQuiosque('${q.nome.replace(/'/g,"\\'")}')">Remover</button></div>
  `).join('');
}
async function addQuiosque(){
  const input = document.getElementById('novoQuiosque');
  const val = input.value.trim();
  if(!val) return;
  await sb.from('consumiveis_quiosques').upsert({ nome: val });
  input.value = '';
  await carregarTudo();
  renderQuiosques();
}
async function delQuiosque(nome){
  await sb.from('consumiveis_quiosques').delete().eq('nome', nome);
  await carregarTudo();
  renderQuiosques();
}

/* ================= PRODUTOS (cadastro) ================= */
function openProdutosConsumiveis(){ renderProdutosConsumiveis(); document.getElementById('overlayProdutos').classList.add('open'); }
function renderProdutosConsumiveis(){
  const c = document.getElementById('listaProdutosConsumiveis');
  if(produtosCache.length === 0){ c.innerHTML = '<div class="empty-msg">Nenhum produto cadastrado ainda.</div>'; return; }
  c.innerHTML = produtosCache.map(p => `
    <div class="list-item">
      <span>${p.codigo} — ${p.produto} (${p.ratio_por_venda}x/venda)</span>
      <button onclick="delProdutoConsumivel('${p.codigo.replace(/'/g,"\\'")}')">Remover</button>
    </div>
  `).join('');
}
async function addProdutoConsumivel(){
  const codigo = document.getElementById('novoProdCod').value.trim();
  const produto = document.getElementById('novoProdNome').value.trim();
  const ratio = parseFloat(document.getElementById('novoProdRatio').value) || 1;
  if(!codigo || !produto) return;
  await sb.from('consumiveis_produtos').upsert({ codigo, produto, ratio_por_venda: ratio, ordem: produtosCache.length + 1 });
  document.getElementById('novoProdCod').value = '';
  document.getElementById('novoProdNome').value = '';
  document.getElementById('novoProdRatio').value = '';
  await carregarTudo();
  renderProdutosConsumiveis();
}
async function delProdutoConsumivel(codigo){
  await sb.from('consumiveis_produtos').delete().eq('codigo', codigo);
  await carregarTudo();
  renderProdutosConsumiveis();
}

/* ================= CÁLCULO (mesma lógica da planilha) ================= */
function calcularLinha(produto, qtdEstoque, totalVendas){
  const consumoEstimado = totalVendas * produto.ratio_por_venda;
  const mediaDia = configCache.dias_analisados > 0 ? consumoEstimado / configCache.dias_analisados : 0;
  const coberturaDesejada = mediaDia * configCache.dias_cobertura_desejada * (1 + configCache.estoque_seguranca_pct / 100);
  const qtdSugerida = Math.max(0, Math.round(coberturaDesejada - qtdEstoque));
  let situacao;
  if(qtdEstoque <= 0) situacao = 'CRITICO';
  else if(coberturaDesejada > 0 && (qtdEstoque / coberturaDesejada) < 0.34) situacao = 'URGENTE';
  else if(qtdSugerida > 0) situacao = 'REPOR';
  else situacao = 'OK';
  return { consumoEstimado, mediaDia, coberturaDesejada, qtdSugerida, situacao };
}
function badgeSituacao(situacao){
  const map = {
    OK: ['badge-ok', 'OK'],
    REPOR: ['badge-repor', 'REPOR'],
    URGENTE: ['badge-urgente', 'URGENTE'],
    CRITICO: ['badge-critico', 'CRÍTICO']
  };
  const [cls, label] = map[situacao];
  return `<span class="badge ${cls}"><span class="dot"></span>${label}</span>`;
}

/* ================= HOME / NAVEGAÇÃO ================= */
function voltarHome(){
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('homeOverlay').style.display = 'flex';
  quiosqueAtual = null; usuarioAtual = null;
}
async function irParaPreencher(){
  await carregarTudo();
  document.getElementById('homeOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('panelPainel').style.display = 'none';
  document.getElementById('panelPreencher').style.display = 'block';
  document.getElementById('topSub').textContent = 'Preencher quiosque';
  renderSelecaoQuiosqueUsuario();
}
async function irParaPainel(){
  await carregarTudo();
  document.getElementById('homeOverlay').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('panelPreencher').style.display = 'none';
  document.getElementById('panelPainel').style.display = 'block';
  document.getElementById('topSub').textContent = 'Painel Central';
  await renderPainelCentral();
}

/* ================= FLUXO: PREENCHER ================= */
function renderSelecaoQuiosqueUsuario(){
  const el = document.getElementById('panelPreencher');
  el.innerHTML = `
    <div class="card" style="max-width:480px;">
      <label>Qual quiosque?</label>
      <select id="selQuiosque" style="margin-bottom:14px;"></select>
      <label>Quem é você?</label>
      <select id="selUsuario" style="margin-bottom:16px;">
        <option value="">Selecione...</option>
        ${USUARIOS.map(u => `<option value="${u}">${u}</option>`).join('')}
      </select>
      <button class="btn-primary" onclick="confirmarSelecao()">Continuar</button>
      <button class="mini-btn" style="width:100%;margin-top:10px;" onclick="openQuiosques()">Gerenciar quiosques</button>
    </div>
  `;
  const sel = document.getElementById('selQuiosque');
  if(quiosquesCache.length === 0){
    sel.innerHTML = '<option value="">Nenhum quiosque cadastrado — clique em "Gerenciar quiosques"</option>';
  } else {
    sel.innerHTML = '<option value="">Selecione...</option>' + quiosquesCache.map(q => `<option value="${q.nome}">${q.nome}</option>`).join('');
  }
}
function confirmarSelecao(){
  const q = document.getElementById('selQuiosque').value;
  const u = document.getElementById('selUsuario').value;
  if(!q || !u){ alert('Selecione o quiosque e o seu nome.'); return; }
  quiosqueAtual = q; usuarioAtual = u;
  document.getElementById('topSub').textContent = `${q} · ${u}`;
  renderFormularioSemanal();
}
function renderFormularioSemanal(){
  const el = document.getElementById('panelPreencher');
  const hoje = new Date().toLocaleDateString('pt-BR');
  el.innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <h2 style="font-size:15px;margin:0;">Painel de Reposição — ${quiosqueAtual}</h2>
        <button class="mini-btn" onclick="openProdutosConsumiveis()">Gerenciar produtos</button>
      </div>
      <div class="config-row">
        <div class="config-item">
          <label>Semana de referência</label>
          <input value="${hoje}" disabled>
        </div>
        <div class="config-item">
          <label>Total de vendas (últimos ${configCache.dias_analisados} dias)</label>
          <input id="totalVendas" type="number" min="0" placeholder="Ex: 486" oninput="recalcularTabela()">
        </div>
        <div class="config-item">
          <label>Dias de cobertura desejada</label>
          <input value="${configCache.dias_cobertura_desejada}" disabled>
        </div>
        <div class="config-item">
          <label>Estoque de segurança</label>
          <input value="${configCache.estoque_seguranca_pct}%" disabled>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Código</th><th>Produto</th><th>Qtd Estoque</th><th>Consumo Est.</th><th>Média/dia</th><th>Cobertura</th><th>Sugestão Pedido</th><th>Situação</th>
            </tr>
          </thead>
          <tbody id="tabelaProdutos"></tbody>
        </table>
      </div>
      <button class="btn-primary" style="margin-top:18px;" onclick="salvarSemanal()">💾 Salvar contagem da semana</button>
      <div id="statusSalvar" style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px;"></div>
    </div>
  `;
  renderLinhasProdutos();
}
function renderLinhasProdutos(){
  const tbody = document.getElementById('tabelaProdutos');
  if(produtosCache.length === 0){
    tbody.innerHTML = `<tr><td colspan="8" class="empty-msg">Nenhum produto cadastrado. Clique em "Gerenciar produtos".</td></tr>`;
    return;
  }
  tbody.innerHTML = produtosCache.map(p => `
    <tr id="linha_${p.codigo}">
      <td>${p.codigo}</td>
      <td>${p.produto}</td>
      <td><input class="qtd-input" type="number" min="0" placeholder="0" data-codigo="${p.codigo}" oninput="recalcularTabela()"></td>
      <td class="num" data-campo="consumo">–</td>
      <td class="num" data-campo="media">–</td>
      <td class="num" data-campo="cobertura">–</td>
      <td class="num" data-campo="sugestao">–</td>
      <td data-campo="situacao">–</td>
    </tr>
  `).join('');
}
function recalcularTabela(){
  const totalVendas = parseFloat(document.getElementById('totalVendas')?.value) || 0;
  produtosCache.forEach(p => {
    const linha = document.getElementById('linha_' + p.codigo);
    if(!linha) return;
    const qtdEstoque = parseFloat(linha.querySelector('.qtd-input').value) || 0;
    const r = calcularLinha(p, qtdEstoque, totalVendas);
    linha.querySelector('[data-campo="consumo"]').textContent = r.consumoEstimado.toFixed(1);
    linha.querySelector('[data-campo="media"]').textContent = r.mediaDia.toFixed(1);
    linha.querySelector('[data-campo="cobertura"]').textContent = r.coberturaDesejada.toFixed(0);
    linha.querySelector('[data-campo="sugestao"]').textContent = r.qtdSugerida;
    linha.querySelector('[data-campo="situacao"]').innerHTML = badgeSituacao(r.situacao);
  });
}
async function salvarSemanal(){
  const totalVendas = parseFloat(document.getElementById('totalVendas')?.value);
  if(!totalVendas && totalVendas !== 0){ alert('Preencha o total de vendas.'); return; }
  const estoques = produtosCache.map(p => {
    const linha = document.getElementById('linha_' + p.codigo);
    const qtdEstoque = parseFloat(linha.querySelector('.qtd-input').value) || 0;
    return { codigo: p.codigo, qtd_estoque: qtdEstoque };
  });
  const status = document.getElementById('statusSalvar');
  status.textContent = 'Salvando...';
  try{
    const { error } = await sb.from('consumiveis_semanal').insert({
      quiosque: quiosqueAtual,
      usuario: usuarioAtual,
      semana_referencia: new Date().toISOString().slice(0,10),
      total_vendas: totalVendas,
      estoques
    });
    if(error) throw error;
    status.textContent = '✅ Salvo com sucesso às ' + new Date().toLocaleTimeString('pt-BR');
  }catch(e){
    console.error(e);
    status.textContent = 'Erro ao salvar. Tente novamente.';
  }
}

/* ================= FLUXO: PAINEL CENTRAL ================= */
async function renderPainelCentral(){
  const el = document.getElementById('panelPainel');
  el.innerHTML = `<div class="card"><div class="empty-msg">Carregando painel...</div></div>`;

  if(quiosquesCache.length === 0){
    el.innerHTML = `<div class="card"><div class="empty-msg">Nenhum quiosque cadastrado ainda.</div></div>`;
    return;
  }

  const ultimos = {};
  for(const q of quiosquesCache){
    const { data } = await sb.from('consumiveis_semanal')
      .select('*').eq('quiosque', q.nome)
      .order('criado_em', { ascending: false }).limit(1);
    ultimos[q.nome] = (data && data[0]) || null;
  }

  let totalCritico = 0, totalUrgente = 0, totalRepor = 0;
  const kioskCards = quiosquesCache.map(q => {
    const registro = ultimos[q.nome];
    if(!registro){
      return `
        <div class="kiosk-card">
          <div class="kiosk-head"><h3>${q.nome}</h3><span class="kiosk-date">Sem registros ainda</span></div>
          <div class="empty-msg">Esse quiosque ainda não preencheu a contagem semanal.</div>
        </div>`;
    }
    const linhas = produtosCache.map(p => {
      const est = (registro.estoques || []).find(e => e.codigo === p.codigo);
      const qtdEstoque = est ? Number(est.qtd_estoque) : 0;
      const r = calcularLinha(p, qtdEstoque, Number(registro.total_vendas));
      if(r.situacao === 'CRITICO') totalCritico++;
      else if(r.situacao === 'URGENTE') totalUrgente++;
      else if(r.situacao === 'REPOR') totalRepor++;
      return `
        <tr>
          <td>${p.codigo}</td><td>${p.produto}</td>
          <td class="num">${qtdEstoque}</td>
          <td class="num">${r.qtdSugerida}</td>
          <td>${badgeSituacao(r.situacao)}</td>
        </tr>`;
    }).join('');
    return `
      <div class="kiosk-card">
        <div class="kiosk-head">
          <h3>${q.nome}</h3>
          <span class="kiosk-date">Vendas: ${registro.total_vendas} · ${registro.usuario || ''} · ${new Date(registro.criado_em).toLocaleDateString('pt-BR')}</span>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>Código</th><th>Produto</th><th>Estoque</th><th>Sugestão</th><th>Situação</th></tr></thead>
            <tbody>${linhas}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="alert-summary">
      <div class="alert-chip badge-critico">🔴 ${totalCritico} item(ns) crítico(s)</div>
      <div class="alert-chip badge-urgente">🟠 ${totalUrgente} item(ns) urgente(s)</div>
      <div class="alert-chip badge-repor">🟡 ${totalRepor} item(ns) pra repor</div>
    </div>
    ${kioskCards}
  `;
}

/* ================= INIT ================= */
carregarTudo();
</script>
